<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="680" height="310" fill="white"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="darr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Headers -->
  <text x="65" y="26" text-anchor="middle" font-size="12" fill="#777">índice</text>
  <text x="210" y="26" text-anchor="middle" font-size="12" fill="#777">bucket</text>

  <!-- [0] empty -->
  <rect x="25" y="38" width="80" height="40" rx="6" fill="#eeede8" stroke="#c8c7bf" stroke-width="0.5"/>
  <text x="65" y="63" text-anchor="middle" font-size="13" fill="#555" font-weight="500">[0]</text>
  <rect x="120" y="38" width="180" height="40" rx="6" fill="#eeede8" stroke="#c8c7bf" stroke-width="0.5"/>
  <text x="210" y="63" text-anchor="middle" font-size="13" fill="#aaa">—</text>

  <!-- [1] teal -->
  <rect x="25" y="90" width="80" height="40" rx="6" fill="#eeede8" stroke="#c8c7bf" stroke-width="0.5"/>
  <text x="65" y="115" text-anchor="middle" font-size="13" fill="#555" font-weight="500">[1]</text>
  <rect x="120" y="90" width="180" height="40" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="210" y="115" text-anchor="middle" font-size="13" fill="white">("edad", 29)</text>

  <!-- [2] chaining -->
  <rect x="25" y="142" width="80" height="40" rx="6" fill="#eeede8" stroke="#c8c7bf" stroke-width="0.5"/>
  <text x="65" y="167" text-anchor="middle" font-size="13" fill="#555" font-weight="500">[2]</text>
  <rect x="120" y="142" width="180" height="40" rx="6" fill="#7F77DD" stroke="#534AB7" stroke-width="0.5"/>
  <text x="210" y="167" text-anchor="middle" font-size="13" fill="white">("nombre", "Ana")</text>
  <line x1="300" y1="162" x2="318" y2="162" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="320" y="142" width="158" height="40" rx="6" fill="#7F77DD" stroke="#534AB7" stroke-width="0.5"/>
  <text x="399" y="167" text-anchor="middle" font-size="13" fill="white">("mail", "a@b.com")</text>
  <line x1="478" y1="162" x2="494" y2="162" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="496" y="150" width="24" height="24" rx="4" fill="#eeede8" stroke="#c8c7bf" stroke-width="0.5"/>
  <text x="508" y="166" text-anchor="middle" font-size="13" fill="#888">ø</text>

  <!-- Collision label -->
  <text x="595" y="116" text-anchor="middle" font-size="11" fill="#999">colisión en [2]</text>
  <line x1="575" y1="120" x2="318" y2="158" stroke="#ccc" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#darr)"/>

  <!-- [3] empty -->
  <rect x="25" y="194" width="80" height="40" rx="6" fill="#eeede8" stroke="#c8c7bf" stroke-width="0.5"/>
  <text x="65" y="219" text-anchor="middle" font-size="13" fill="#555" font-weight="500">[3]</text>
  <rect x="120" y="194" width="180" height="40" rx="6" fill="#eeede8" stroke="#c8c7bf" stroke-width="0.5"/>
  <text x="210" y="219" text-anchor="middle" font-size="13" fill="#aaa">—</text>

  <!-- [4] teal -->
  <rect x="25" y="246" width="80" height="40" rx="6" fill="#eeede8" stroke="#c8c7bf" stroke-width="0.5"/>
  <text x="65" y="271" text-anchor="middle" font-size="13" fill="#555" font-weight="500">[4]</text>
  <rect x="120" y="246" width="180" height="40" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="210" y="271" text-anchor="middle" font-size="13" fill="white">("ciudad", "BsAs")</text>
</svg>
